# RAG 管线配置（所有 profile 共享）
cook:
  rag:
    document-root: ${COOK_DOC_ROOT:../CookLikeHOC}

    token-splitter:
      chunk-size: 800
      min-chunk-size-chars: 350
      min-chunk-length-to-embed: 10
      max-num-chunks: 5000
      keep-separator: true

    retrieval:
      top-k: 5
      similarity-threshold: 0.50
